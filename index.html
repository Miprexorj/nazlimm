<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazlı'm İçin Özel...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; font-family: 'Poppins', sans-serif; background: #000; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            cursor: pointer; /* Tıklanabilir olduğunu hissettirir */
        }
        
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; z-index: 3; width: 100%; padding: 20px;
        }

        .text-content { text-align: center; }
        h1 { font-size: 2.5rem; color: white; text-shadow: 0 0 20px #ff1493; margin-bottom: 5px; }
        p { font-size: 1.2rem; color: #ff85a1; }

        #bg-video { 
            max-width: 90%; max-height: 60vh; border-radius: 20px;
            box-shadow: 0 15px 50px rgba(255, 20, 147, 0.4);
            object-fit: contain;
        }

        /* Ses Uyarısı */
        #mute-hint {
            position: fixed; top: 400px; right: 100px; color: white;
            background: rgba(255, 20, 147, 0.6); padding: 8px 15px;
            border-radius: 20px; font-size: 0.9rem; z-index: 10;
            animation: pulse 2s infinite;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a000a 0%, #000 100%); z-index: 1; 
        }

        .heart { 
            position: fixed; color: #ff4d6d; font-size: 22px; z-index: 4; 
            pointer-events: none; animation: floatUp linear forwards; 
        }

        @keyframes floatUp { 
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
        @keyframes pulse {
            0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; }
        }
    </style>
</head>
<body onclick="unmuteVideo()">

    <div id="mute-hint">🔊 Sesi Açmak İçin Dokun</div>
    <div class="overlay"></div>

    <div class="main-wrapper">
        <div class="text-content">
            <h1>İyi Ki Varsın yavrumm</h1>
            <p>Seni Çok Seviyorum birtanemmm</p>
        </div>

        <video id="bg-video" autoplay muted loop playsinline>
            <source src="leyla.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const hint = document.getElementById('mute-hint');

        function unmuteVideo() {
            video.muted = false; // Sesi açar
            video.play(); // Oynatmayı garantiler
            hint.style.display = 'none'; // Uyarıyı gizler
            
            // Kalpleri başlat
            if(!window.heartInterval) {
                window.heartInterval = setInterval(createHeart, 400);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
    </script>
</body>
</html>
